# Fluent Bit – Jarvis Log Aggregation Config
# Liest Logs aller jarvis-* Container und schreibt sie in /var/log/jarvis/

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Log_File     /var/log/jarvis/fluent-bit.log
    Parsers_File parsers.conf

# ─────────────────────────────────────────────
# INPUT: Docker Container Logs
# ─────────────────────────────────────────────
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Tag               jarvis.*

# ─────────────────────────────────────────────
# FILTER: Bereichere Logs mit Container-Metadaten
# ─────────────────────────────────────────────
[FILTER]
    Name              record_modifier
    Match             jarvis.*
    Record            host ${HOSTNAME}
    Record            project jarvis-4.0

# ─────────────────────────────────────────────
# OUTPUT: Rotierte Log-Dateien pro Service
# ─────────────────────────────────────────────
[OUTPUT]
    Name              file
    Match             jarvis.jarvis-core.*
    Path              /var/log/jarvis
    File              core.log
    Format            json_lines

[OUTPUT]
    Name              file
    Match             jarvis.jarvis-rag.*
    Path              /var/log/jarvis
    File              rag.log
    Format            json_lines

[OUTPUT]
    Name              file
    Match             jarvis.jarvis-gateway.*
    Path              /var/log/jarvis
    File              gateway.log
    Format            json_lines

[OUTPUT]
    Name              file
    Match             jarvis.jarvis-sandbox.*
    Path              /var/log/jarvis
    File              sandbox.log
    Format            json_lines

# Fallback: alles in combined.log
[OUTPUT]
    Name              file
    Match             *
    Path              /var/log/jarvis
    File              combined.log
    Format            json_lines
